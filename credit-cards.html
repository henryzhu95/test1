<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Credit Cards – Jane Doe</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      background: #fafafa;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    main {
      max-width: 1350px;
      width: 100%;
    }

    /* ── Nav Banner ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      z-index: 100;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      transition: background 0.2s;
    }

    nav a:hover {
      background: #333;
    }

    /* ── Heading ── */
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    /* ── Card Grid ── */
    .card-row {
      display: flex;
      gap: 1.5rem;
    }

    .card-row img {
      width: 0;
      flex: 1 1 0;
      aspect-ratio: 8 / 5;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #ddd;
      transition: transform 0.2s, filter 0.2s;
    }

    .card-row img:hover {
      transform: scale(1.05);
      filter: brightness(0.75);
    }

    .card-wrapper {
      position: relative;
      flex: 1 1 0;
      width: 0;
    }

    .card-wrapper img {
      width: 100%;
      flex: none;
    }

    .card-wrapper .overlay-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .card-wrapper:hover .overlay-label {
      opacity: 1;
    }

    /* ── Footer ── */
    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="#">About</a>
    <a href="credit-cards.html">Current Credit Cards</a>
    <a href="index.html#contact-form">Contact</a>
  </nav>
  <main>
    <h1>Current Credit Cards</h1>
    <div class="card-row">
      <div class="card-wrapper">
        <img src="images/venture-x.png" alt="Capital One Venture X">
        <span class="overlay-label">Active: Feb 2025</span>
      </div>
      <div class="card-wrapper">
        <img src="images/atmos-rewards.png" alt="Atmos Rewards Summit">
        <span class="overlay-label">Active: Feb 2026</span>
      </div>
      <div class="card-wrapper">
        <img src="images/chase-aeroplan.png" alt="Chase Aeroplan">
        <span class="overlay-label">Active: Jan 2023</span>
      </div>
      <div class="card-wrapper">
        <img src="images/chase-sapphire-preferred.png" alt="Chase Sapphire Preferred">
        <span class="overlay-label">Active: May 2023</span>
      </div>
    </div>

    <footer>&copy; 2026 Jane Doe</footer>
  </main>
</body>
</html>
