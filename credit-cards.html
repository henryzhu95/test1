<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Credit Cards – Jane Doe</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      background: #fafafa;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    main {
      max-width: 700px;
      width: 100%;
    }

    /* ── Nav Banner ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      z-index: 100;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      transition: background 0.2s;
    }

    nav a:hover {
      background: #333;
    }

    /* ── Heading ── */
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #ddd;
    }

    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.9rem;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #1a1a1a;
      color: #fff;
      font-weight: 500;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    td {
      color: #555;
    }

    /* ── Footer ── */
    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="#">About</a>
    <a href="credit-cards.html">Current Credit Cards</a>
    <a href="index.html#contact-form">Contact</a>
  </nav>
  <main>
    <h1>Current Credit Cards</h1>
    <table>
      <thead>
        <tr>
          <th>Card Name</th>
          <th>Issuer</th>
          <th>Annual Fee</th>
          <th>Rewards</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
      </tbody>
    </table>

    <footer>&copy; 2026 Jane Doe</footer>
  </main>
</body>
</html>
